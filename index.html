<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Line OS | God-Level Monolith</title>
    <style>
        :root {
            --bg: #010409; --card: #0d1117; --accent: #58a6ff;
            --text: #c9d1d9; --led: #00ffcc; --warn: #f85149;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; overflow: hidden; display: flex;
            flex-direction: column; height: 100vh;
        }

        #wave-status {
            height: 4px; width: 100%;
            background: linear-gradient(90deg, transparent, var(--led), transparent);
            background-size: 200% 100%; box-shadow: 0 0 15px var(--led);
        }

        /* SIDEBAR & LAYOUT */
        #main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        #side-menu {
            width: 220px; background: var(--card);
            border-right: 1px solid #30363d; display: flex;
            flex-direction: column; padding: 15px; gap: 8px;
            overflow-y: auto;
        }

        .side-btn {
            text-align: left; background: transparent; border: none;
            color: var(--text); padding: 12px; cursor: pointer;
            border-radius: 8px; font-size: 0.85rem; transition: 0.2s;
            display: flex; align-items: center;
        }

        .side-btn:hover { background: #21262d; color: var(--accent); }
        .side-btn.active { background: #161b22; color: var(--accent); border-left: 3px solid var(--accent); }

        #stage { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

        #content-area { flex-grow: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top, #0d1117 0%, #010409 100%); }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* COMPONENTS */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .anime-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; cursor: pointer; }
        .anime-card img { width: 100%; height: 250px; object-fit: cover; }
        
        #compiler-bar { background: var(--card); padding: 20px; border-top: 1px solid #30363d; display: flex; gap: 15px; }
        #cmd-input { flex-grow: 1; background: #000; border: 1px solid #30363d; color: #00ff00; padding: 14px; font-family: monospace; border-radius: 8px; }
        
        .stat-card { background: #161b22; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="wave-status"></div>

    <div id="main-layout">
        <aside id="side-menu">
            <div style="color:var(--accent); font-weight:bold; margin-bottom:15px; font-size:0.9rem;">CORE MODULES</div>
            </aside>

        <section id="stage">
            <main id="content-area"></main>
            
            <div id="compiler-bar">
                <input type="text" id="cmd-input" placeholder="READY. (GOTO, SEARCH, FIND, STATUS)">
                <button onclick="processCommand()" style="background:var(--accent); color:white; border:none; padding:0 30px; border-radius:8px; cursor:pointer; font-weight:bold;">EXECUTE</button>
            </div>
        </section>
    </div>

<script>
    const pageNames = [
        "Home", "Profile", "Global Feed", "Cinema Mode", "Discord Hub", 
        "Character Search", "Photonic Sim", "Manga List", "MAL Search", "Kernel Logs",
        "Settings", "Feedback", "One Piece DB", "Logic Manual", "System Status"
    ];

    const Dictionary = {
        "GOTO": (val) => switchPage(parseInt(val) - 1),
        "SEARCH": (val) => { switchPage(8); globalAnimeSearch(val); },
        "FIND": (val) => { switchPage(5); document.getElementById('char-input').value = val; searchCharacter(); },
        "STATUS": () => switchPage(14),
        "HELP": () => switchPage(13)
    };

    let logs = [];
    const contentArea = document.getElementById('content-area');
    const sideMenu = document.getElementById('side-menu');

    // --- RENDER ALL 15 PAGES ---
    pageNames.forEach((name, i) => {
        const div = document.createElement('div');
        div.id = `page-${i}`;
        div.className = `page ${i === 0 ? 'active' : ''}`;

        // Page Logic Injection
        if (i === 0) { // HOME
            div.innerHTML = `<h1>☠️ Red Line OS</h1><p>Legendary Monolith v3.0</p><div class="stat-card"><h3>System Performance</h3><p>Memory: 55.4MB | CPU: Optimized | Threads: Wave-Sync</p></div>`;
        } else if (i === 3) { // CINEMA
            div.innerHTML = `<h1>🎬 Cinema Mode</h1><div id="video-engine">Search an anime to inject video stream.</div>`;
        } else if (i === 5) { // LOCAL SEARCH
            div.innerHTML = `<h1>🔍 Local DB</h1><input type="text" id="char-input" placeholder="Luffy..."><button onclick="searchCharacter()">SCAN</button><div id="search-result"></div>`;
        } else if (i === 6) { // PHOTONIC SIM
            div.innerHTML = `<h1>💡 Photonic Logic Sim</h1><p>Calculating Light-Based Logic Gates...</p><div style="background:#000; height:100px; border:1px solid var(--led); display:flex; align-items:center; justify-content:center;">SIGNAL: STABLE (1.002 THz)</div>`;
        } else if (i === 8) { // MAL SEARCH
            div.innerHTML = `<h1>🌐 MAL Global Grid</h1><div id="mal-results" class="anime-grid"></div>`;
        } else if (i === 9) { // LOGS
            div.innerHTML = `<h1>💾 Kernel Logs</h1><div id="log-container" style="font-family:monospace; color:#8b949e;"></div>`;
        } else if (i === 12) { // ONE PIECE DB
            div.innerHTML = `<h1>🍖 Straw Hat Database</h1><p>Luffy, Zoro, Nami, Usopp, Sanji, Chopper, Robin, Franky, Brook, Jinbe.</p>`;
        } else if (i === 14) { // STATUS
            div.innerHTML = `<h1>⚡ System Status</h1><div class="stat-card">Logic Cycles: <span id="cycles">0</span></div><div class="stat-card">Wave Frequency: 60Hz</div>`;
        } else {
            div.innerHTML = `<h1>${name}</h1><p>Module Online. Waiting for Data.</p>`;
        }

        contentArea.appendChild(div);

        // Sidebar Button (The Bridge)
        const btn = document.createElement('button');
        btn.className = `side-btn ${i===0?'active':''}`;
        btn.id = `side-${i}`;
        btn.innerHTML = `<span style="width:20px; opacity:0.5;">${i+1}</span> ${name}`;
        btn.onclick = () => {
            document.getElementById('cmd-input').value = `GOTO ${i+1}`;
            processCommand();
        };
        sideMenu.appendChild(btn);
    });

    function switchPage(index) {
        if(index < 0 || index >= pageNames.length) return;
        addLog(`JUMP -> ${pageNames[index].toUpperCase()}`);
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`page-${index}`).classList.add('active');
        document.getElementById(`side-${index}`).classList.add('active');
    }

    async function globalAnimeSearch(query) {
        const container = document.getElementById('mal-results');
        container.innerHTML = "📡 QUERYING GLOBAL NODE...";
        try {
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&limit=6`);
            const json = await res.json();
            container.innerHTML = "";
            json.data.forEach(a => {
                container.innerHTML += `<div class="anime-card"><img src="${a.images.jpg.image_url}" onclick="playTrailer('${a.title}')"><h4>${a.title}</h4></div>`;
            });
        } catch(e) { addLog("API FAIL"); }
    }

    function playTrailer(title) {
        addLog(`STREAM_INIT -> ${title.toUpperCase()}`);
        switchPage(3); // Jump to Cinema Mode
        
        // Use the proper YouTube Search Embed format
        const searchUrl = `https://www.youtube.com/embed?autoplay=1&rel=0&listType=search&list=${encodeURIComponent(title + " official trailer")}`;
        
        const videoContainer = document.getElementById('page-3');
        videoContainer.innerHTML = `
            <h1 style="color:var(--accent); margin-bottom:20px;">🎬 Cinema Mode: ${title}</h1>
            <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:15px; border:2px solid var(--accent); box-shadow: 0 0 30px rgba(88, 166, 255, 0.3);">
                <iframe 
                    style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                    src="${searchUrl}" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>
            <div style="margin-top:20px; padding:15px; background:var(--card); border-radius:8px; border-left:4px solid var(--led);">
                <p style="margin:0; font-size:0.9rem;"><b>WAVE STATUS:</b> RECEIVING DATA STREAM</p>
                <p style="margin:5px 0 0 0; font-size:0.8rem; opacity:0.6;">Protocol: YouTube Data API v3 (Emulated)</p>
            </div>
        `;
    }

    function processCommand() {
        const raw = document.getElementById('cmd-input').value.trim();
        if(!raw) return;
        const parts = raw.toUpperCase().split(" ");
        const cmd = parts[0];
        const val = raw.substring(cmd.length).trim();
        if (Dictionary[cmd]) Dictionary[cmd](val);
        addLog(`EXE: ${cmd}`);
        document.getElementById('cmd-input').value = "";
    }

    function addLog(msg) {
        logs.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
        const container = document.getElementById('log-container');
        if(container) container.innerHTML = logs.join('<br>');
    }

    let pulse = 0;
    function waveEngine() {
        pulse += 0.04;
        document.getElementById('wave-status').style.opacity = (Math.sin(pulse) * 0.4) + 0.6;
        if(document.getElementById('cycles')) document.getElementById('cycles').innerText = Math.floor(pulse * 100);
        requestAnimationFrame(waveEngine);
    }
    waveEngine();

    document.getElementById('cmd-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') processCommand(); });
</script>
</body>
</html>
