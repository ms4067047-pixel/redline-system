<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Line OS | God-Level Monolith</title>
    <style>
        :root {
            --bg: #010409; --card: #0d1117; --accent: #58a6ff;
            --text: #c9d1d9; --led: #00ffcc; --warn: #f85149;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; overflow: hidden; display: flex;
            flex-direction: column; height: 100vh;
        }

        #wave-status {
            height: 4px; width: 100%;
            background: linear-gradient(90deg, transparent, var(--led), transparent);
            background-size: 200% 100%; box-shadow: 0 0 15px var(--led);
        }

        /* SIDEBAR & LAYOUT */
        #main-layout { display: flex; flex-grow: 1; overflow: hidden; }

        #side-menu {
            width: 220px; background: var(--card);
            border-right: 1px solid #30363d; display: flex;
            flex-direction: column; padding: 15px; gap: 8px;
            overflow-y: auto;
        }

        .side-btn {
            text-align: left; background: transparent; border: none;
            color: var(--text); padding: 12px; cursor: pointer;
            border-radius: 8px; font-size: 0.85rem; transition: 0.2s;
            display: flex; align-items: center;
        }

        .side-btn:hover { background: #21262d; color: var(--accent); }
        .side-btn.active { background: #161b22; color: var(--accent); border-left: 3px solid var(--accent); }

        #stage { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }

        #content-area { flex-grow: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top, #0d1117 0%, #010409 100%); }

        .page { display: none; animation: slideUp 0.4s ease-out; }
        .page.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* COMPONENTS */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .anime-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #30363d; transition: 0.3s; cursor: pointer; }
        .anime-card img { width: 100%; height: 250px; object-fit: cover; }
        
        #compiler-bar { background: var(--card); padding: 20px; border-top: 1px solid #30363d; display: flex; gap: 15px; }
        #cmd-input { flex-grow: 1; background: #000; border: 1px solid #30363d; color: #00ff00; padding: 14px; font-family: monospace; border-radius: 8px; }
        
        .stat-card { background: #161b22; padding: 15px; border-radius: 8px; border-left: 4px solid var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="wave-status"></div>

    <div id="main-layout">
        <aside id="side-menu">
            <div style="color:var(--accent); font-weight:bold; margin-bottom:15px; font-size:0.9rem;">CORE MODULES</div>
            </aside>

        <section id="stage">
            <main id="content-area"></main>
            
            <div id="compiler-bar">
                <input type="text" id="cmd-input" placeholder="READY. (GOTO, SEARCH, FIND, STATUS)">
                <button onclick="processCommand()" style="background:var(--accent); color:white; border:none; padding:0 30px; border-radius:8px; cursor:pointer; font-weight:bold;">EXECUTE</button>
            </div>
        </section>
    </div>

<script>
    const pageNames = [
        "Home", "Profile", "Global Feed", "Cinema Mode", "Discord Hub", 
        "Character Search", "Photonic Sim", "Manga List", "MAL Search", "Kernel Logs",
        "Settings", "Feedback", "One Piece DB", "Logic Manual", "System Status"
    ];

    const Dictionary = {
        "GOTO": (val) => switchPage(parseInt(val) - 1),
        "SEARCH": (val) => { switchPage(8); globalAnimeSearch(val); },
        "FIND": (val) => { switchPage(5); document.getElementById('char-input').value = val; searchCharacter(); },
        "STATUS": () => switchPage(14),
        "HELP": () => switchPage(13)
    };

    let logs = [];
    const contentArea = document.getElementById('content-area');
    const sideMenu = document.getElementById('side-menu');

    pageNames.forEach((name, i) => {
        const div = document.createElement('div');
        div.id = `page-${i}`;
        div.className = `page ${i === 0 ? 'active' : ''}`;

        if (i === 0) { 
            div.innerHTML = `<h1>☠️ Red Line OS</h1><div class="stat-card"><h3>Kernel: v3.0 Legendary</h3><p>Architecture: Monolithic SPA</p><p>Memory Footprint: 55.4MB</p></div><p>Welcome, Engineer. Use the Sidebar or Compiler to navigate.</p>`;
        } else if (i === 3) { 
            div.innerHTML = `<h1>🎬 Cinema Mode</h1><div id="video-engine" style="text-align:center; padding:50px; border:2px dashed var(--accent); border-radius:15px;">WAITING FOR MEDIA SIGNAL...</div>`;
        } else if (i === 5) { 
            div.innerHTML = `<h1>🔍 Character Search</h1><input type="text" id="char-input" style="background:#000; color:#0f0; border:1px solid var(--accent); padding:10px; border-radius:5px;"><button onclick="searchCharacter()" style="background:var(--accent); border:none; color:#fff; padding:10px; margin-left:10px; cursor:pointer;">SCAN</button><div id="search-result" style="margin-top:20px;"></div>`;
        } else if (i === 8) { 
            div.innerHTML = `<h1>🌐 MAL Global Search</h1><div id="mal-results" class="anime-grid"></div>`;
        } else if (i === 9) { 
            div.innerHTML = `<h1>💾 Kernel Logs</h1><div id="log-container" style="font-family:monospace; color:#0f0; background:#000; padding:15px; border-radius:5px; height:300px; overflow-y:auto;"></div>`;
        } else if (i === 12) { 
            div.innerHTML = `<h1>🍖 Straw Hat DB</h1><div class="anime-grid">
                <div class="stat-card"><b>Luffy</b><br>Captain</div>
                <div class="stat-card"><b>Zoro</b><br>Swordsman</div>
                <div class="stat-card"><b>Nami</b><br>Navigator</div>
            </div>`;
        } else if (i === 13) { 
            div.innerHTML = `<h1>📖 Logic Manual</h1><p><b>Wave Logic:</b> Uses Sinusoidal oscillators for UI sync.</p><p><b>Macro-Compiler:</b> Maps string tokens to JS executable functions.</p>`;
        } else if (i === 14) { 
            div.innerHTML = `<h1>⚡ System Status</h1><div class="stat-card">LOGIC CYCLES: <span id="cycles">0</span></div><div class="stat-card">UPTIME: <span id="uptime">0</span>s</div>`;
        } else {
            div.innerHTML = `<h1>${name}</h1><p>Module active. Awaiting data stream.</p>`;
        }

        contentArea.appendChild(div);
        const btn = document.createElement('button');
        btn.className = `side-btn ${i===0?'active':''}`;
        btn.id = `side-${i}`;
        btn.innerHTML = `<span style="width:20px; opacity:0.5;">${i+1}</span> ${name}`;
        btn.onclick = () => { document.getElementById('cmd-input').value = `GOTO ${i+1}`; processCommand(); };
        sideMenu.appendChild(btn);
    });

    function switchPage(index) {
        if(index < 0 || index >= pageNames.length) return;
        addLog(`JUMP -> ${pageNames[index].toUpperCase()}`);
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`page-${index}`).classList.add('active');
        document.getElementById(`side-${index}`).classList.add('active');
    }

    async function globalAnimeSearch(query) {
        const container = document.getElementById('mal-results');
        container.innerHTML = "<div style='color:var(--led)'>📡 SCANNING GLOBAL NODES...</div>";
        try {
            const res = await fetch(`https://api.jikan.moe/v4/anime?q=${query}&limit=6`);
            const json = await res.json();
            container.innerHTML = "";
            
            json.data.forEach(a => {
                // We create a card that passes the Title to our new Player
                container.innerHTML += `
                    <div class="anime-card" onclick="playTrailer('${a.title.replace(/'/g, "")}')">
                        <img src="${a.images.jpg.image_url}">
                        <div style="padding:10px;">
                            <b style="font-size:0.8rem;">${a.title}</b>
                            <div style="color:var(--accent); font-size:0.7rem;">CLICK TO VIEW</div>
                        </div>
                    </div>`;
            });
            addLog(`GRID_RENDER: ${json.data.length} OBJECTS`);
        } catch(e) { 
            addLog("CONNECTION_ERR: API TIMEOUT");
        }
    }

    function playTrailer(title) {
        addLog(`INJECTING MEDIA: ${title.toUpperCase()}`);
        switchPage(3); // Go to Cinema Mode
        
        // --- THE "GOD-MODE" ID RESOLVER ---
        // These specific IDs are allowed to be embedded anywhere
        let videoId = "S8_YwFLCh4U"; // Default: One Piece (Netflix)
        
        if (title.toUpperCase().includes("NARUTO")) videoId = "S-7T_Ym70qM"; // Naruto Shippuden
        if (title.toUpperCase().includes("SOLO LEVELING")) videoId = "9FqOof70F7o";
        if (title.toUpperCase().includes("DEMON SLAYER")) videoId = "2gvuxG_6u7g";
        if (title.toUpperCase().includes("ONE PIECE FILM RED")) videoId = "89J01_I_P7o";

        const videoEngine = document.getElementById('page-3');
        
        videoEngine.innerHTML = `
            <h1 style="color:var(--accent);">🎬 Cinema Mode: ${title}</h1>
            <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:15px; border:2px solid var(--accent); box-shadow: 0 0 40px rgba(0, 255, 204, 0.2);">
                <iframe 
                    style="position:absolute; top:0; left:0; width:100%; height:100%;" 
                    src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0" 
                    frameborder="0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
                </iframe>
            </div>
            <div class="stat-card" style="margin-top:20px; border-left: 4px solid var(--led);">
                <p><b>STREAM STATUS:</b> SECURE (Bypassing Restriction)</p>
                <p><b>PROTOCOL:</b> YouTube No-Cookie Embed Mode</p>
            </div>
        `;
    }

    function searchCharacter() {
        const name = document.getElementById('char-input').value.toLowerCase();
        const res = document.getElementById('search-result');
        const db = {"luffy":"Monkey D. Luffy - Gomu Gomu no Mi", "zoro":"Roronoa Zoro - 3 Sword Style"};
        res.innerHTML = db[name] ? `<div class="stat-card">${db[name]}</div>` : "NOT IN LOCAL DB";
        addLog(`DB SCAN: ${name.toUpperCase()}`);
    }

    function processCommand() {
        const raw = document.getElementById('cmd-input').value.trim();
        if(!raw) return;
        const parts = raw.toUpperCase().split(" ");
        const cmd = parts[0];
        const val = raw.substring(cmd.length).trim();
        if (Dictionary[cmd]) Dictionary[cmd](val);
        addLog(`EXE: ${cmd}`);
        document.getElementById('cmd-input').value = "";
    }

    function addLog(msg) {
        logs.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
        const logBox = document.getElementById('log-container');
        if(logBox) logBox.innerHTML = logs.join('<br>');
    }

    let pulse = 0;
    let start = Date.now();
    function waveEngine() {
        pulse += 0.04;
        document.getElementById('wave-status').style.opacity = (Math.sin(pulse) * 0.4) + 0.6;
        if(document.getElementById('cycles')) document.getElementById('cycles').innerText = Math.floor(pulse * 100);
        if(document.getElementById('uptime')) document.getElementById('uptime').innerText = Math.floor((Date.now() - start)/1000);
        requestAnimationFrame(waveEngine);
    }
    waveEngine();
</script>
</body>
</html>
